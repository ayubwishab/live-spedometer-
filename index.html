<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scania Cockpit Navigation Full Detail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0d10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Area Peta HD - Memunculkan semua objek (Rumah, Kost, RS, dll) */
        #map {
            flex: 1;
            width: 100%;
            background-color: #1a1e24;
        }

        /* Filter CSS Pintar: Mengubah peta standar menjadi Dark Mode tanpa merusak/menghilangkan teks & ikon tempat */
        .scania-dark-map {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        /* PANEL DASHBOARD SCANIA BARU */
        .scania-dashboard {
            height: 280px; 
            background: linear-gradient(to top, #06080a 85%, #151b22 100%);
            border-top: 4px solid #3a4659;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 15px 10px;
            position: relative;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.9);
            z-index: 1000;
        }

        /* Ukuran Lingkaran Speedometer Analog Scania */
        .scania-cluster {
            position: relative;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #13181f 60%, #07090c 100%);
            border: 5px solid #2e3745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .gauge-track {
            position: absolute;
            width: 88%;
            height: 88%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            border-bottom-color: transparent;
            transform: rotate(-45deg);
        }

        .gauge-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            font-weight: bold;
            font-size: 12px;
            color: #9ca3af;
        }

        .num { position: absolute; width: 20px; height: 20px; text-align: center; line-height: 20px; }
        .n0   { top: 145px; left: 35px; }
        .n20  { top: 85px;  left: 18px; }
        .n40  { top: 35px;  left: 40px; }
        .n65  { top: 15px;  left: 90px; }
        .n80  { top: 30px;  left: 138px;}
        .n100 { top: 75px;  left: 162px; color: #ff453a;}
        .n120 { top: 135px; left: 148px; color: #ff453a; }

        .pointer-needle {
            position: absolute;
            width: 4px;
            height: 82px;
            background: #ff2a2a;
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            transform: rotate(-120deg);
            transition: transform 0.2s ease-out;
            z-index: 3;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .center-cap {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #111418;
            border: 2px solid #485569;
            border-radius: 50%;
            z-index: 4;
        }

        /* Layar MID Digital */
        .scania-mid-display {
            background: #030507;
            border: 2px solid #45a29e;
            width: 180px;
            height: 120px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .digital-speed {
            font-size: 64px;
            font-weight: 900;
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            line-height: 1;
            letter-spacing: -2px;
        }

        .unit {
            font-size: 12px;
            color: #45a29e;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .satellite-status {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #526274;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="map"></div>

        <div class="scania-dashboard">
            <div class="scania-cluster">
                <div class="gauge-track"></div>
                <div class="gauge-numbers">
                    <div class="num n0">0</div>
                    <div class="num n20">20</div>
                    <div class="num n40">40</div>
                    <div class="num n65">65</div>
                    <div class="num n80">80</div>
                    <div class="num n100">100</div>
                    <div class="num n120">120</div>
                </div>
                <div class="pointer-needle" id="needle"></div>
                <div class="center-cap"></div>
            </div>

            <div class="scania-mid-display">
                <div class="digital-speed" id="speed-text">0</div>
                <div class="unit">km/h</div>
            </div>

            <div class="satellite-status" id="status">MENCARI SATELIT GPS...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const speedText = document.getElementById('speed-text');
        const needle = document.getElementById('needle');
        const statusMode = document.getElementById('status');

        let map, marker;
        let mapInitialized = false;

        // Inisialisasi Peta HD Resmi OpenStreetMap (Bebas Batasan / Gratis)
        function initMap(lat, lng) {
            map = L.map('map', {
                zoomControl: false, 
                attributionControl: false
            }).setView([lat, lng], 18); // Zoom 18 ditingkatkan agar nama Kost, Toko, Rumah, Mall terlihat detail melimpah

            // Menggunakan Tile Server utama OSM yang di-dark-mode-kan lewat class CSS khusus
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                className: 'scania-dark-map' // Mengaktifkan filter dark mode hemat baterai
            }).addTo(map);

            // Penanda kendaraan warna merah neon bersinar
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div style="width:16px; height:16px; background:#ff2a2a; border:3px solid #fff; border-radius:50%; box-shadow:0 0 10px #ff2a2a;"></div>',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
            mapInitialized = true;
        }

        // Kontrol rotasi jarum spedometer Scania
        function updateScaniaDashboard(speed) {
            let safeSpeed = Math.min(speed, 120); 
            let degrees = -120 + (safeSpeed * 1.916); 
            
            speedText.innerText = speed;
            needle.style.transform = `rotate(${degrees}deg)`;
        }

        // Jalankan pelacakan hardware satelit GPS
        if ('geolocation' in navigator) {
            initMap(-6.2088, 106.8456); // Koordinat dummy awal saat web baru dibuka

            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    let speedMS = position.coords.speed;

                    // Menggeser peta mengikuti gerak kendaraan secara otomatis
                    if (mapInitialized) {
                        marker.setLatLng([lat, lng]);
                        map.panTo([lat, lng]); 
                    }

                    // Filter peredam getaran GPS palsu di dalam ruangan
                    if (accuracy > 40) {
                        statusMode.innerText = `SINYAL LEMAH • AKURASI: ${Math.round(accuracy)}M`;
                        statusMode.style.color = "#ff453a";
                        updateScaniaDashboard(0);
                        return;
                    }

                    if (speedMS === null || speedMS < 0) {
                        speedMS = 0;
                    }

                    let speedKMH = Math.round(speedMS * 3.6);

                    // Kunci angka di 0 jika unit dalam kondisi berhenti total
                    if (speedKMH < 3) {
                        speedKMH = 0;
                    }

                    statusMode.innerText = `SCANIA COCKPIT ONLINE • GPS AKURAT (${Math.round(accuracy)}M)`;
                    statusMode.style.color = "#45a29e";
                    updateScaniaDashboard(speedKMH);
                },
                (err) => {
                    statusMode.innerText = "GPS ERROR: AKTIFKAN LOKASI HP";
                    statusMode.style.color = "#ff453a";
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            statusMode.innerText = "BROWSER TIDAK MENDUKUNG HARDWARE GPS";
        }
    </script>
</body>
</html>
