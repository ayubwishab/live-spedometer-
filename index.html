<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Speedometer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .speed-badge {
            font-size: 14px;
            background-color: #222;
            padding: 6px 12px;
            border-radius: 20px;
            color: #888;
            margin-bottom: 40px;
            display: inline-block;
            border: 1px solid #333;
        }

        .speed-display {
            font-size: 120px;
            font-weight: bold;
            color: #00ff66; /* Warna hijau neon sesuai gambar */
            line-height: 1;
        }

        .unit {
            font-size: 24px;
            color: #888;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .error-msg {
            color: #ff3333;
            margin-top: 20px;
            font-size: 14px;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="speed-badge" id="accuracy">Akurasi: Menghubungkan GPS...</div>
        
        <div class="speed-display" id="speed">0</div>
        <div class="unit">KM/H</div>
        
        <div class="error-msg" id="error"></div>
    </div>

    <script>
        const speedEl = document.getElementById('speed');
        const accuracyEl = document.getElementById('accuracy');
        const errorEl = document.getElementById('error');

        // Fungsi utama untuk memantau perubahan posisi (GPS)
        function initSpeedometer() {
            if ('geolocation' in navigator) {
                
                // Menggunakan watchPosition agar terus memantau pergerakan HP secara live
                navigator.geolocation.watchPosition(
                    (position) => {
                        // Clear error jika berhasil mendeteksi posisi
                        errorEl.innerText = "";

                        // 1. Ambil kecepatan (dalam meter per detik / m/s)
                        let speedMS = position.coords.speed;

                        // Jaga-jaga jika sensor mengembalikan nilai null (HP diam/tidak bergerak)
                        if (speedMS === null || speedMS < 0) {
                            speedMS = 0;
                        }

                        // Konversi m/s ke KM/H: (m/s) * 3.6
                        const speedKMH = Math.round(speedMS * 3.6);
                        
                        // Tampilkan kecepatan ke layar
                        speedEl.innerText = speedKMH;

                        // 2. Ambil tingkat akurasi GPS (dalam meter)
                        const accuracy = Math.round(position.coords.accuracy);
                        accuracyEl.innerText = `Akurasi: ${accuracy}m`;
                    },
                    (error) => {
                        // Menangani error jika GPS tidak aktif atau izin ditolak
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorEl.innerText = "Izin GPS ditolak. Mohon izinkan lokasi di browser Anda.";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorEl.innerText = "Informasi lokasi tidak tersedia (Cek GPS HP Anda).";
                                break;
                            case error.TIMEOUT:
                                errorEl.innerText = "Waktu permintaan lokasi habis.";
                                break;
                            default:
                                errorEl.innerText = "Terjadi kesalahan pada GPS.";
                        }
                    },
                    {
                        // Pengaturan wajib agar otak hardware HP bekerja maksimal:
                        enableHighAccuracy: true, // Wajib TRUE agar HP menyalakan hardware GPS utama (bukan sekadar seluler/wifi)
                        timeout: 5000,            // Durasi maksimal mencari sinyal (5 detik)
                        maximumAge: 0             // Memaksa browser mengambil data posisi paling baru (real-time)
                    }
                );

            } else {
                errorEl.innerText = "Browser Anda tidak mendukung Geolocation API.";
            }
        }

        // Jalankan fungsi saat web dibuka
        window.onload = initSpeedometer;
    </script>
</body>
</html>
