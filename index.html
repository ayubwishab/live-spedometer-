<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scania Style Speedometer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Utama ala Dashboard Scania */
        .dashboard-cluster {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Lingkaran Speedometer Luar */
        .scania-gauge {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid #1f2833;
            border-radius: 50%;
            border-bottom-color: transparent; /* Membuat efek melingkar khas Scania */
            transform: rotate(-45deg);
        }

        /* Jarum Speedometer (Aksen Merah Khas Scania) */
        .pointer-needle {
            position: absolute;
            width: 4px;
            height: 120px;
            background: linear-gradient(to top, transparent 40%, #ff0000 40%);
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            transform: rotate(-120deg); /* Angka 0 km/h */
            transition: transform 0.3s ease-out;
            z-index: 2;
        }

        /* Pusat Jarum */
        .center-node {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #111;
            border: 3px solid #ff0000;
            border-radius: 50%;
            z-index: 3;
        }

        /* Kotak MID Digital Tengah */
        .scania-mid {
            position: absolute;
            bottom: 40px;
            background-color: #050505;
            border: 2px solid #45a29e;
            padding: 10px 20px;
            border-radius: 4px;
            text-align: center;
            min-width: 140px;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.1);
            z-index: 4;
        }

        .digital-speed {
            font-size: 42px;
            font-weight: bold;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1;
        }

        .unit {
            font-size: 11px;
            color: #45a29e;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Info Tambahan di Atas */
        .top-info {
            position: absolute;
            top: 30px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-badge {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="top-info">Scania Instrument Cluster</div>

    <div class="dashboard-cluster">
        <div class="scania-gauge"></div>
        <div class="pointer-needle" id="needle"></div>
        <div class="center-node"></div>

        <div class="scania-mid">
            <div class="digital-speed" id="speed-text">0</div>
            <div class="unit">KM/H</div>
        </div>
    </div>

    <div class="status-badge" id="status">Mode: Menunggu Sinyal...</div>

    <script>
        const speedText = document.getElementById('speed-text');
        const needle = document.getElementById('needle');
        const statusMode = document.getElementById('status');

        // Batas rotasi jarum (0 km/h = -120deg, 120 km/h = 120deg)
        function updateScaniaGauge(speed) {
            // Batasi speed maksimal untuk jarum di angka 120
            let safeSpeed = Math.min(speed, 120); 
            
            // Hitung derajat perputaran jarum
            let degrees = -120 + (safeSpeed * 2); 
            
            // Update Tampilan
            speedText.innerText = speed;
            needle.style.transform = `rotate(${degrees}deg)`;
        }

        // --- SISTEM INDOOR OLEH AKSELEROMETER / MOTION SENSOR ---
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                if (!acc) return;

                // Ambil total gerakan dari gabungan sumbu X, Y, Z
                let totalMovement = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);

                // Jika sedang di dalam ruangan dan HP digoyang/dibawa jalan di tempat
                if (totalMovement > 11) { 
                    statusMode.innerText = "Mode: Indoor (Sensor Gerak)";
                    statusMode.style.color = "#45a29e";
                    
                    // Kalkulasi kecepatan kasaran berdasarkan entakan tangan/saku
                    let simulatedSpeed = Math.round((totalMovement - 11) * 2);
                    updateScaniaGauge(simulatedSpeed);
                }
            });
        }

        // --- SISTEM UTAMA OUTDOOR (GPS) ---
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const accuracy = position.coords.accuracy;
                    let speedMS = position.coords.speed;

                    // Jika akurasi bagus, prioritaskan GPS penuh (Outdoor)
                    if (accuracy < 25 && speedMS !== null) {
                        statusMode.innerText = `Mode: Outdoor (GPS Akurat: ${Math.round(accuracy)}m)`;
                        statusMode.style.color = "#00ff66";
                        
                        let speedKMH = Math.round(speedMS * 3.6);
                        if (speedKMH < 3) speedKMH = 0;
                        
                        updateScaniaGauge(speedKMH);
                    }
                },
                (err) => { console.log("Mencari sinyal GPS terbaik..."); },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
