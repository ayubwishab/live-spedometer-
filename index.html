<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scania Cockpit Real Google Maps PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0d10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Area Peta Google Maps Asli */
        #map {
            flex: 1;
            width: 100%;
            background-color: #e5e3df;
        }

        /* PANEL DASHBOARD SCANIA (Tinggi dinaikkan ke 320px & Gradasi Dihapus) */
        .scania-dashboard {
            height: 320px; 
            background: #06080a;
            border-top: 4px solid #3a4659;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 15px 10px;
            position: relative;
            z-index: 1000; /* Tanpa box-shadow/gradasi atas */
        }

        /* Ukuran Lingkaran Speedometer Analog Scania */
        .scania-cluster {
            position: relative;
            width: 210px;
            height: 210px;
            background: radial-gradient(circle, #13181f 60%, #07090c 100%);
            border: 5px solid #2e3745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-track {
            position: absolute;
            width: 88%;
            height: 88%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            border-bottom-color: transparent;
            transform: rotate(-45deg);
        }

        .gauge-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
            color: #9ca3af;
        }

        .num { position: absolute; width: 20px; height: 20px; text-align: center; line-height: 20px; }
        .n0   { top: 152px; left: 38px; }
        .n20  { top: 90px;  left: 20px; }
        .n40  { top: 38px;  left: 42px; }
        .n65  { top: 16px;  left: 95px; }
        .n80  { top: 32px;  left: 145px;}
        .n100 { top: 78px;  left: 170px; color: #ff453a;}
        .n120 { top: 142px; left: 155px; color: #ff453a; }

        .pointer-needle {
            position: absolute;
            width: 4px;
            height: 86px;
            background: #ff2a2a;
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            transform: rotate(-120deg);
            transition: transform 0.2s ease-out;
            z-index: 3;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .center-cap {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #111418;
            border: 2px solid #485569;
            border-radius: 50%;
            z-index: 4;
        }

        /* Layar MID Digital */
        .scania-mid-display {
            background: #030507;
            border: 2px solid #45a29e;
            width: 190px;
            height: 130px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .digital-speed {
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            line-height: 1;
            letter-spacing: -2px;
        }

        .unit {
            font-size: 13px;
            color: #45a29e;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .satellite-status {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #526274;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="map"></div>

        <div class="scania-dashboard">
            <div class="scania-cluster">
                <div class="gauge-track"></div>
                <div class="gauge-numbers">
                    <div class="num n0">0</div>
                    <div class="num n20">20</div>
                    <div class="num n40">40</div>
                    <div class="num n65">65</div>
                    <div class="num n80">80</div>
                    <div class="num n100">100</div>
                    <div class="num n120">120</div>
                </div>
                <div class="pointer-needle" id="needle"></div>
                <div class="center-cap"></div>
            </div>

            <div class="scania-mid-display">
                <div class="digital-speed" id="speed-text">0</div>
                <div class="unit">km/h</div>
            </div>

            <div class="satellite-status" id="status">MENCARI SATELIT GPS...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const speedText = document.getElementById('speed-text');
        const needle = document.getElementById('needle');
        const statusMode = document.getElementById('status');

        let map, marker, accuracyCircle;
        let mapInitialized = false;

        // Inisialisasi Google Maps Asli Terang
        function initMap(lat, lng) {
            map = L.map('map', {
                zoomControl: false, 
                attributionControl: false
            }).setView([lat, lng], 18); 

            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 22
            }).addTo(map);

            const googleBlueIcon = L.divIcon({
                className: 'google-marker',
                html: '<div style="width:18px; height:18px; background:#1a73e8; border:3px solid #fff; border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });

            marker = L.marker([lat, lng], { icon: googleBlueIcon }).addTo(map);
            
            accuracyCircle = L.circle([lat, lng], {
                radius: 0,
                color: '#1a73e8',
                fillColor: '#1a73e8',
                fillOpacity: 0.15,
                weight: 1
            }).addTo(map);

            mapInitialized = true;
        }

        function updateScaniaDashboard(speed) {
            let safeSpeed = Math.min(speed, 120); 
            let degrees = -120 + (safeSpeed * 1.916); 
            
            speedText.innerText = speed;
            needle.style.transform = `rotate(${degrees}deg)`;
        }

        if ('geolocation' in navigator) {
            initMap(-6.2088, 106.8456); 

            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    let speedMS = position.coords.speed;

                    if (mapInitialized) {
                        marker.setLatLng([lat, lng]);
                        accuracyCircle.setLatLng([lat, lng]);
                        accuracyCircle.setRadius(accuracy); 
                        map.panTo([lat, lng]); 
                    }

                    if (accuracy > 50) {
                        statusMode.innerText = `AKURASI RENDAH (${Math.round(accuracy)}M) • UTAMAKAN OUTDOOR`;
                        statusMode.style.color = "#ff453a";
                        updateScaniaDashboard(0);
                        return;
                    }

                    if (speedMS === null || speedMS < 0) {
                        speedMS = 0;
                    }

                    let speedKMH = Math.round(speedMS * 3.6);

                    if (speedKMH < 3) {
                        speedKMH = 0;
                    }

                    statusMode.innerText = `SCANIA COCKPIT ONLINE • GOOGLE MAPS LIVE`;
                    statusMode.style.color = "#45a29e";
                    updateScaniaDashboard(speedKMH);
                },
                (err) => {
                    statusMode.innerText = "GPS ERROR: AKTIFKAN LOKASI HP DAN AKSES HTTPS";
                    statusMode.style.color = "#ff453a";
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            statusMode.innerText = "BROWSER TIDAK MENDUKUNG HARDWARE GPS";
        }
    </script>
</body>
</html>
