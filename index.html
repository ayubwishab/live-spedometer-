<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scania Next-Gen Cockpit with Maps</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0d10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Container Utama membagi layar: Atas Peta, Bawah Speedometer */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Area Peta (Keren & Fullscreen di bagian atas) */
        #map {
            flex: 1;
            width: 100%;
            background-color: #111;
        }

        /* Panel Dashboard Bawah (Gaya Scania Modern) */
        .scania-dashboard {
            height: 240px;
            background: linear-gradient(to top, #07090b 80%, #11161d 100%);
            border-top: 3px solid #2e3846;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 10px 20px;
            position: relative;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            z-index: 1000; /* Agar di atas peta */
        }

        /* Lingkaran Speedometer Kiri */
        .scania-cluster {
            position: relative;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #12161b 60%, #080a0d 100%);
            border: 4px solid #242b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-track {
            position: absolute;
            width: 88%;
            height: 88%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            border-bottom-color: transparent;
            transform: rotate(-45deg);
        }

        .gauge-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            font-weight: bold;
            font-size: 10px;
            color: #9ca3af;
        }

        .num { position: absolute; width: 20px; height: 20px; text-align: center; line-height: 20px; }
        .n0   { top: 125px; left: 30px; }
        .n40  { top: 35px;  left: 32px; }
        .n80  { top: 25px;  left: 105px;}
        .n120 { top: 110px; left: 130px; color: #ff453a; }

        .pointer-needle {
            position: absolute;
            width: 3px;
            height: 70px;
            background: #ff2a2a;
            bottom: 50%;
            left: calc(50% - 1.5px);
            transform-origin: bottom center;
            transform: rotate(-120deg);
            transition: transform 0.2s ease-out;
            z-index: 3;
        }

        .center-cap {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #111418;
            border: 2px solid #3a4451;
            border-radius: 50%;
            z-index: 4;
        }

        /* Layar Komputer MID Kanan (Sangat Modern) */
        .scania-mid-display {
            background: #040608;
            border: 2px solid #45a29e;
            width: 160px;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .digital-speed {
            font-size: 54px;
            font-weight: 900;
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            line-height: 1;
            letter-spacing: -2px;
        }

        .unit {
            font-size: 11px;
            color: #45a29e;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Bar Status GPS di paling bawah */
        .satellite-status {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #526274;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="map"></div>

        <div class="scania-dashboard">
            <div class="scania-cluster">
                <div class="gauge-track"></div>
                <div class="gauge-numbers">
                    <div class="num n0">0</div>
                    <div class="num n40">40</div>
                    <div class="num n80">80</div>
                    <div class="num n120">120</div>
                </div>
                <div class="pointer-needle" id="needle"></div>
                <div class="center-cap"></div>
            </div>

            <div class="scania-mid-display">
                <div class="digital-speed" id="speed-text">0</div>
                <div class="unit">km/h</div>
            </div>

            <div class="satellite-status" id="status">MENCARI SATELIT GPS...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const speedText = document.getElementById('speed-text');
        const needle = document.getElementById('needle');
        const statusMode = document.getElementById('status');

        let map, marker;
        let mapInitialized = false;

        // 1. Inisialisasi Peta Awal (Default posisi Jakarta sebelum GPS mengunci)
        function initMap(lat, lng) {
            map = L.map('map', {
                zoomControl: false, // Sembunyikan tombol +/- agar terlihat clean seperti HUD Bus
                attributionControl: false
            }).setView([lat, lng], 16);

            // Menggunakan tema peta Dark Mode / CartoDB Dark Matter agar serasi dengan Scania
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            // Membuat penanda posisi kendaraan
            marker = L.marker([lat, lng]).addTo(map);
            mapInitialized = true;
        }

        // 2. Fungsi update dashboard Scania (0 km/h = -120deg, 120 km/h = 110deg)
        function updateScaniaDashboard(speed) {
            let safeSpeed = Math.min(speed, 120); 
            let degrees = -120 + (safeSpeed * 1.916); 
            
            speedText.innerText = speed;
            needle.style.transform = `rotate(${degrees}deg)`;
        }

        // 3. Menghubungkan ke Hardware GPS HP Anda
        if ('geolocation' in navigator) {
            // Set default peta sementara di koordinat umum (Jakarta) saat loading
            initMap(-6.2088, 106.8456);

            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    let speedMS = position.coords.speed;

                    // Update Posisi Peta & Penanda Kendaraan secara real-time
                    if (mapInitialized) {
                        marker.setLatLng([lat, lng]);
                        map.panTo([lat, lng]); // Peta otomatis geser mengikuti bus jalan
                    }

                    // Filter Akurasi Ruangan (Anti-Goyang)
                    if (accuracy > 40) {
                        statusMode.innerText = `SINYAL LEMAH • AKURASI: ${Math.round(accuracy)}M`;
                        statusMode.style.color = "#ff453a";
                        updateScaniaDashboard(0);
                        return;
                    }

                    if (speedMS === null || speedMS < 0) {
                        speedMS = 0;
                    }

                    // Konversi m/s ke KM/H
                    let speedKMH = Math.round(speedMS * 3.6);

                    // Threshold Diam (Kunci di angka 0 saat lampu merah / berhenti)
                    if (speedKMH < 3) {
                        speedKMH = 0;
                    }

                    // Update UI Dashboard
                    statusMode.innerText = `SCANIA COCKPIT ONLINE • GPS AKURAT (${Math.round(accuracy)}M)`;
                    statusMode.style.color = "#45a29e";
                    updateScaniaDashboard(speedKMH);
                },
                (err) => {
                    statusMode.innerText = "GPS ERROR: AKTIFKAN LOKASI HP";
                    statusMode.style.color = "#ff453a";
                },
                {
                    enableHighAccuracy: true, // Memaksa HP menghidupkan chip hardware GPS
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            statusMode.innerText = "BROWSER TIDAK MENDUKUNG HARDWARE GPS";
        }
    </script>
</body>
</html>
